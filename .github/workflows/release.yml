name: Build Release

on:
  push:
    branches:
      - release

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build webview
        run: pnpm run build-webview

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies

      - name: Get VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls excalidraw-editor-*.vsix | head -n 1)
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "VSIX file: $VSIX_FILE"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.vsix_file }}
          path: ${{ steps.vsix.outputs.vsix_file }}
          retention-days: 90

      - name: Create checksum
        run: |
          sha256sum ${{ steps.vsix.outputs.vsix_file }} > ${{ steps.vsix.outputs.vsix_file }}.sha256

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.vsix_file }}.sha256
          path: ${{ steps.vsix.outputs.vsix_file }}.sha256
          retention-days: 90
