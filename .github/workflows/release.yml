name: Build Release

on:
  push:
    branches:
      - release

jobs:
  build:
    name: Build VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build webview
        run: pnpm run build-webview

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package extension
        run: vsce package --no-dependencies

      - name: Rename VSIX with version
        run: |
          mv excalidraw-editor-*.vsix excalidraw-editor-${{ env.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: excalidraw-editor-${{ env.version }}.vsix
          path: excalidraw-editor-${{ env.version }}.vsix
          retention-days: 90

      - name: Create checksum
        run: |
          sha256sum excalidraw-editor-${{ env.version }}.vsix > excalidraw-editor-${{ env.version }}.vsix.sha256

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: excalidraw-editor-${{ env.version }}.vsix.sha256
          path: excalidraw-editor-${{ env.version }}.vsix.sha256
          retention-days: 90
